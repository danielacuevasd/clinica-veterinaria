server:
  port: 9081

spring:
  application:
    name: ms-auth

  datasource:
    url: jdbc:mysql://localhost:3307/db_auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: vet_user
    password: vet_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:9761/eureka/
  instance:
    prefer-ip-address: true