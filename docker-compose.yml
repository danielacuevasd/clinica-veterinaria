      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_veterinarios
      MYSQL_USER: vet_user
      MYSQL_PASSWORD: vet_pass
    volumes:
      - db_veterinarios_data:/var/lib/mysql

  db-citas:
    image: mysql:8.0
    container_name: db-citas
    ports:
      - "3311:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_citas
      MYSQL_USER: vet_user
      MYSQL_PASSWORD: vet_pass
    volumes:
      - db_citas_data:/var/lib/mysql

  db-consultas:
