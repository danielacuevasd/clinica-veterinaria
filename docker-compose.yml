version: '3.8'

services:

  # ── KAFKA + ZOOKEEPER ────────────────────────────────────────────
  # Kafka es el sistema de mensajería para comunicación asíncrona
  # Zookeeper es requerido por Kafka para coordinar sus procesos
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ── BASES DE DATOS ───────────────────────────────────────────────
  # Cada bloque es un contenedor MySQL independiente
  # Puerto externo (el de tu PC) es distinto en cada uno
  # Puerto interno del contenedor siempre es 3306
  # MYSQL_DATABASE crea esa BD automáticamente al iniciar

  db-auth:
    image: mysql:8.0
    container_name: db-auth
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_auth
      MYSQL_USER: vet_user
      MYSQL_PASSWORD: vet_pass
    volumes:
      - db_auth_data:/var/lib/mysql

  db-usuarios:
    image: mysql:8.0
    container_name: db-usuarios
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_usuarios
      MYSQL_USER: vet_user
      MYSQL_PASSWORD: vet_pass
    volumes:
      - db_usuarios_data:/var/lib/mysql

  db-mascotas:
