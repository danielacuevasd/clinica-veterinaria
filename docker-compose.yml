  db-tratamientos:
    image: mysql:8.0
    container_name: db-tratamientos
    ports:
      - "3313:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_tratamientos
      MYSQL_USER: vet_user
      MYSQL_PASSWORD: vet_pass
    volumes:
      - db_tratamientos_data:/var/lib/mysql

  db-inventario:
    image: mysql:8.0
    container_name: db-inventario
    ports:
      - "3314:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_inventario
      MYSQL_USER: vet_user
      MYSQL_PASSWORD: vet_pass
