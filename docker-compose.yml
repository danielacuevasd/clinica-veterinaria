    container_name: db-mascotas
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_mascotas
      MYSQL_USER: vet_user
      MYSQL_PASSWORD: vet_pass
    volumes:
      - db_mascotas_data:/var/lib/mysql

  db-veterinarios:
    image: mysql:8.0
    container_name: db-veterinarios
