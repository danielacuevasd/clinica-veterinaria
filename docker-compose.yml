    container_name: db-notificaciones
    ports:
      - "3316:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_notif
      MYSQL_USER: vet_user
      MYSQL_PASSWORD: vet_pass
    volumes:
      - db_notif_data:/var/lib/mysql

# Los volúmenes persisten los datos aunque reinicies los contenedores
volumes:
  db_auth_data:
  db_usuarios_data:
  db_mascotas_data:
  db_veterinarios_data:
  db_citas_data:
  db_consultas_data:
  db_tratamientos_data:
  db_inventario_data:
  db_facturacion_data:
  db_notif_data: